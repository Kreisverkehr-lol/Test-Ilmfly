<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt – Ilmfly</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
  <div class="logo-wrap">
    <a href="Ilmfly-Startseite.html">
    <img src="../Image/Ilmfly_Logo.jpeg" alt="Ilmfly Logo">
    </a>
    <span>ILMFLY</span>
  </div>
  <div class="menu-container">
    <button id="menu-icon">☰</button>
    <ul id="dropdown-menu">
      <li><a href="index.html">Startseite</a></li>
      <li><a href="ueber-ilmfly.html">Über Ilmfly</a></li>
      <li><a href="produkte.html">Produkte</a></li>
      <li><a href="kontakt.html">Kontakt</a></li>
      <li><a href="impressum.html">Impressum</a></li>
      <li><a href="datenschutz.html">Datenschutz</a></li>
    </ul>
  </div>
</header>

<main>
  <div class="page-label">Schreib uns</div>
  <h1>Kontakt</h1>
  <div class="divider"></div>
  <p>Du hast Fragen oder möchtest mit uns in Kontakt treten? Wir freuen uns von dir zu hören.</p>

  <div class="contact-form">
    <input type="text" placeholder="Dein Name">
    <input type="email" placeholder="Deine E-Mail-Adresse">
    <input type="text" placeholder="Betreff">
    <textarea rows="5" placeholder="Deine Nachricht..."></textarea>
    <button type="button">Nachricht senden</button>
  </div>
</main>

<footer>
  <p>© 2025 Ilmfly · <a href="impressum.html">Impressum</a> · <a href="datenschutz.html">Datenschutz</a></p>
</footer>

<script>
  const btn = document.getElementById('menu-icon');
  const menu = document.getElementById('dropdown-menu');
  btn.addEventListener('click', () => {
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
  });
  document.addEventListener('click', e => {
    if (!btn.contains(e.target) && !menu.contains(e.target)) menu.style.display = 'none';
  });
  document.querySelectorAll('#dropdown-menu a').forEach(a => {
    if (a.href === location.href) a.classList.add('active');
  });
</script>
</body>
</html>
